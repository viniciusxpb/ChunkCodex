<div class="chunk-crafting-grid__matrix">
  @for (slot of craftingSlots(); track trackSlot($index, slot)) {
    @if (slot.item; as item) {
      <chunk-crafting-grid-item [item]="item" />
    } @else {
      <chunk-crafting-grid-empty />
    }
  }
</div>
<div class="chunk-crafting-grid__arrow" aria-hidden="true"></div>
<div class="chunk-crafting-grid__result">
  @if (result(); as item) {
    <chunk-crafting-grid-item [item]="item" variant="result" />
  }
</div>
